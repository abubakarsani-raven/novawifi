name: nova_heronix_wifi_manager
description: Nova Heronix WiFi Manager — write, store, and share WiFi network credentials using NFC tags and QR codes.
publish_to: 'none'
version: 1.0.0+3

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  nfc_manager: ^4.0.0
  qr_flutter: ^4.1.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.0.0
  share_plus: ^7.2.2
  screenshot: ^3.0.0
  gal: ^2.3.0
  crypto: ^3.0.3
  permission_handler: ^11.3.1
  uuid: ^4.3.3
  google_fonts: ^6.2.1
  pdf: ^3.11.3
  printing: ^5.14.2
  wifi_scan: ^0.4.1+2
  nfc_manager_ndef: ^1.1.0
  app_links: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.9
  flutter_launcher_icons: ^0.14.0
  flutter_native_splash: ^2.4.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/branding/icon_ios.png

flutter_launcher_icons:
  ios: true
  image_path_ios: "assets/branding/icon_ios.png"
  remove_alpha_ios: true
  android: true
  image_path_android: "assets/branding/icon_android.png"
  adaptive_icon_background: "#0084F6"
  adaptive_icon_foreground: "assets/branding/icon_android_fg.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#FFFFFF"
  image: "assets/branding/splash.png"
  android_12:
    image: "assets/branding/splash.png"
    color: "#FFFFFF"
  android: true
  ios: true
  web: false
