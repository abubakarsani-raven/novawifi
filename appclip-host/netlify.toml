# Netlify Drop skips hidden folders like .well-known on macOS.
# Serve the visible file at the exact path Apple requires.
[[redirects]]
  from = "/.well-known/apple-app-site-association"
  to = "/apple-app-site-association"
  status = 200
  force = true

# Guest landing page. iPhones with the App Clip registered get the App Clip
# card instead; this page is the universal fallback (Safari / Android browser).
[[redirects]]
  from = "/wifi"
  to = "/wifi.html"
  status = 200

[[headers]]
  for = "/.well-known/apple-app-site-association"
  [headers.values]
    Content-Type = "application/json"

[[headers]]
  for = "/apple-app-site-association"
  [headers.values]
    Content-Type = "application/json"
