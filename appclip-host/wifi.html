<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="robots" content="noindex" />
    <title>Join Wi‑Fi · Nova Heronix</title>
    <style>
      :root {
        --bg: #0f0b1e;
        --card: #1b1530;
        --accent: #7c5cff;
        --accent-press: #6a49f0;
        --text: #f4f2ff;
        --muted: #a79fc7;
        --ok: #34d399;
        --line: #2c2545;
      }
      * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
      html, body { margin: 0; height: 100%; }
      body {
        background: radial-gradient(120% 80% at 50% 0%, #241a44 0%, var(--bg) 60%);
        color: var(--text);
        font: 16px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        display: flex; flex-direction: column; align-items: center;
        padding: max(28px, env(safe-area-inset-top)) 20px 32px;
        min-height: 100%;
      }
      .brand {
        text-transform: uppercase; letter-spacing: 2px; font-size: 12px;
        color: var(--muted); margin: 8px 0 28px;
      }
      .glyph {
        width: 72px; height: 72px; border-radius: 20px;
        background: linear-gradient(160deg, var(--accent), #4b32b8);
        display: grid; place-items: center; margin-bottom: 14px;
        box-shadow: 0 12px 30px rgba(124, 92, 255, 0.35);
      }
      .glyph svg { width: 38px; height: 38px; fill: #fff; }
      .card {
        width: 100%; max-width: 420px; background: var(--card);
        border: 1px solid var(--line); border-radius: 22px;
        padding: 26px 22px; box-shadow: 0 20px 50px rgba(0,0,0,0.4);
      }
      .label { font-size: 24px; font-weight: 700; text-align: center; word-break: break-word; }
      .ssid { text-align: center; color: var(--muted); margin-top: 4px; word-break: break-word; }
      .pwwrap { margin-top: 22px; }
      .pwlabel { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }
      .pw {
        margin-top: 6px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 18px; background: #120e24; border: 1px solid var(--line);
        border-radius: 12px; padding: 12px 14px; word-break: break-all; user-select: all;
      }
      button {
        width: 100%; margin-top: 18px; border: 0; cursor: pointer;
        background: var(--accent); color: #fff; font-size: 17px; font-weight: 600;
        padding: 15px; border-radius: 14px; transition: background .15s, transform .05s;
      }
      button:active { background: var(--accent-press); transform: scale(.99); }
      button.copied { background: var(--ok); }
      button.ghost {
        background: transparent; color: var(--muted);
        border: 1px solid var(--line); margin-top: 10px;
      }
      button.ghost:active { background: rgba(255,255,255,0.04); }
      ol { margin: 24px 4px 0; padding-left: 20px; color: var(--muted); font-size: 14px; }
      ol li { margin: 6px 0; }
      ol b { color: var(--text); }
      .empty { text-align: center; color: var(--muted); padding: 14px 4px; }
      .foot { color: var(--muted); font-size: 12px; margin-top: 26px; text-align: center; }
    </style>
  </head>
  <body>
    <div class="glyph" aria-hidden="true">
      <svg viewBox="0 0 24 24"><path d="M12 18a1.5 1.5 0 1 0 0 3 1.5 1.5 0 0 0 0-3Zm0-4.2c-1.7 0-3.2.6-4.4 1.7l1.6 1.6c.8-.7 1.8-1.1 2.8-1.1s2 .4 2.8 1.1l1.6-1.6A6.7 6.7 0 0 0 12 13.8Zm0-4.3c-2.8 0-5.4 1-7.3 2.8l1.6 1.6A8 8 0 0 1 12 11.6a8 8 0 0 1 5.7 2.3l1.6-1.6A10.4 10.4 0 0 0 12 9.5Zm0-4.3c-3.9 0-7.5 1.5-10.2 3.9l1.6 1.6A12.3 12.3 0 0 1 12 7.3c3.2 0 6.2 1.2 8.6 3.4l1.6-1.6A14.7 14.7 0 0 0 12 5.2Z"/></svg>
    </div>
    <div class="brand">Nova Heronix</div>

    <div class="card" id="card">
      <div class="empty" id="empty">Tap your Nova tag to load a network, then this page will show the details.</div>
    </div>

    <div class="foot">Your password is read on this device only — it is never sent to a server.</div>

    <script>
      (function () {
        function decode() {
          var h = location.hash || "";
          if (h.indexOf("#d=") !== 0) return null;
          try {
            var raw = decodeURIComponent(h.slice(3));
            var json = JSON.parse(atob(raw));
            if (!json || !json.s) return null;
            return { ssid: json.s, password: json.p || "", label: json.l || "" };
          } catch (e) { return null; }
        }

        function esc(s) {
          return String(s).replace(/[&<>"']/g, function (c) {
            return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
          });
        }

        var creds = decode();
        if (!creds) return; // keep empty-state message

        var title = creds.label || creds.ssid;
        var sub = creds.label ? '<div class="ssid">' + esc(creds.ssid) + "</div>" : "";
        var card = document.getElementById("card");
        card.innerHTML =
          '<div class="label">' + esc(title) + "</div>" + sub +
          (creds.password
            ? '<div class="pwwrap"><div class="pwlabel">Password</div>' +
              '<div class="pw" id="pw" data-shown="0">••••••••</div>' +
              '<button id="reveal" class="ghost">Show</button>' +
              '<button id="copy">Copy password</button></div>'
            : '<div class="empty">This is an open network — no password needed.</div>') +
          "<ol>" +
          (creds.password ? "<li>Tap <b>Copy password</b>.</li>" : "") +
          "<li>Open <b>Settings → Wi‑Fi</b>.</li>" +
          "<li>Choose <b>" + esc(creds.ssid) + "</b>.</li>" +
          (creds.password ? "<li><b>Paste</b> the password and join.</li>" : "<li>Join.</li>") +
          "</ol>";

        var pwEl = document.getElementById("pw");
        var reveal = document.getElementById("reveal");
        if (reveal && pwEl) {
          reveal.addEventListener("click", function () {
            var shown = pwEl.getAttribute("data-shown") === "1";
            pwEl.textContent = shown ? "••••••••" : creds.password;
            pwEl.setAttribute("data-shown", shown ? "0" : "1");
            reveal.textContent = shown ? "Show" : "Hide";
          });
        }

        var btn = document.getElementById("copy");
        if (btn) {
          btn.addEventListener("click", function () {
            var done = function () {
              btn.textContent = "Copied ✓";
              btn.classList.add("copied");
              setTimeout(function () {
                btn.textContent = "Copy password";
                btn.classList.remove("copied");
              }, 2000);
            };
            if (navigator.clipboard && navigator.clipboard.writeText) {
              navigator.clipboard.writeText(creds.password).then(done, fallback);
            } else { fallback(); }
            function fallback() {
              // Copy without revealing: use a temporary off-screen field.
              var ta = document.createElement("textarea");
              ta.value = creds.password;
              ta.setAttribute("readonly", "");
              ta.style.position = "absolute";
              ta.style.left = "-9999px";
              document.body.appendChild(ta);
              ta.select();
              try { document.execCommand("copy"); done(); } catch (e) {}
              document.body.removeChild(ta);
            }
          });
        }
      })();
    </script>
  </body>
</html>
